<svg width="200" height="120" viewBox="0 0 200 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="120" fill="#F5F5F5"/>
  
  <!-- Navigation Bar -->
  <rect y="20" width="200" height="40" fill="white"/>
  
  <!-- Left Menu Items -->
  <rect x="20" y="32" width="40" height="16" rx="2" fill="#E0E0E0"/>
  <rect x="65" y="32" width="40" height="16" rx="2" fill="#E0E0E0"/>
  
  <!-- Center Logo -->
  <circle cx="100" cy="40" r="8" fill="#4A4A4A"/>
  
  <!-- Right Menu Items -->
  <rect x="120" y="32" width="40" height="16" rx="2" fill="#E0E0E0"/>
  <rect x="165" y="32" width="40" height="16" rx="2" fill="#E0E0E0"/>
  
  <!-- Label -->
  <text x="100" y="100" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">Lacto Navigation</text>
</svg>
